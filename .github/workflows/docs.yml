name: Build and deploy docs

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install sphinx sphinx_rtd_theme sphinx-intl myst-parser

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra texlive-fonts-recommended texlive-lang-german

      - name: Build English docs
        run: cd docs && make html

      - name: Build German docs
        run: cd docs && sphinx-build -b html -D language=de source build/html/de

      - name: Build German PDF
        run: make pdf
        working-directory: docs/wahlverfahren/de

      - name: Copy PDFs into docs site
        run: |
          mkdir -p docs/build/html/wahlverfahren
          cp docs/wahlverfahren/de/dist/*.pdf docs/build/html/wahlverfahren/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
